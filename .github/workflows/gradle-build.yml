name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      kdoc-id: ${{ steps.upload-kdoc.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Build
        run: ./gradlew --info --stacktrace :build
      - name: Upload KDoc
        id: upload-kdoc
        uses: actions/upload-artifact@v7
        with:
          name: kdoc
          path: aggregation/dokka/build/dokka/html

  publish-snapshot:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
      - name: Create initial tag for semver
        run: |
          if ! git rev-parse v0.1.0 >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag v0.1.0
            git push origin v0.1.0
          fi
      - name: Delete existing snapshot versions
        run: |
          for pkg in $(gh api -H "Accept: application/vnd.github+json" "/user/packages?package_type=maven&per_page=100" --jq '.[].name'); do
            for ver_id in $(gh api -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions?per_page=100" --jq '.[] | select(.name | test("-SNAPSHOT$"; "i")) | .id'); do
              gh api -X DELETE -H "Accept: application/vnd.github+json" "/user/packages/maven/${pkg}/versions/${ver_id}" || true
            done
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set snapshot version properties
        # The com.javiersc.semver plugin reads stage/scope/tagPrefix from
        # gradle.properties via a three-tier lookup. In a composite build,
        # -P flags only reach the root build's startParameter, so we must
        # write directly to each included build's gradle.properties.
        #
        # semver.tagPrefix must be set explicitly as a property — the plugin
        # has a bug where getTagPrefixProperty() defaults to "" when the
        # property is absent, even though the settings extension sets it to
        # "v". Without this, tagPrefix != projectTagPrefix and the plugin
        # silently ignores stage/scope.
        #
        # To avoid the +DIRTY version suffix, we hide modified tracked files
        # with git update-index --assume-unchanged, and newly created files
        # with .git/info/exclude.
        run: |
          SEMVER_PROPS=$(printf 'semver.stage=snapshot\nsemver.scope=patch\nsemver.tagPrefix=v\n')
          CREATED_FILES=()
          MODIFIED_FILES=()

          for dir in . cores/* aggregation metadata; do
            [ -f "$dir/settings.gradle.kts" ] || [ "$dir" = "." ] || continue
            props="$dir/gradle.properties"
            if [ -f "$props" ]; then
              printf '\n%s\n' "$SEMVER_PROPS" >> "$props"
              MODIFIED_FILES+=("$props")
            else
              printf '%s\n' "$SEMVER_PROPS" > "$props"
              CREATED_FILES+=("$props")
            fi
          done

          for f in "${MODIFIED_FILES[@]}"; do
            git update-index --assume-unchanged "$f"
          done

          for f in "${CREATED_FILES[@]}"; do
            echo "$f" >> .git/info/exclude
          done
      - name: Publish Snapshot
        run: ./gradlew :publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download KDoc
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.build.outputs.kdoc-id }}
          path: kdoc
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: kdoc
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
